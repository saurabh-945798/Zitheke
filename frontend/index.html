 <!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <!-- Primary SEO -->
  <title>Zitheke | Buy. Sell. Connect.</title>

  <meta
    name="description"
    content="Zitheke is your trusted local marketplace in Malawi to buy, sell, and connect with confidence."
  />

  <meta
    name="keywords"
    content="Zitheke, buy and sell Malawi, Malawi marketplace, classified ads Malawi, sell online Malawi"
  />

  <meta name="author" content="Zitheke Marketplace" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://zitheke.com/" />

  <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Zitheke Marketplace" />
  <meta property="og:title" content="Zitheke | Buy. Sell. Connect." />

  <meta
    property="og:description"
    content="Discover trusted local listings on Zitheke. Buy, sell, and connect across Malawi."
  />

  <meta property="og:url" content="https://zitheke.com/" />

  <!-- IMPORTANT: absolute image URL -->
  <meta
    property="og:image"
    content="https://zitheke.com/favicon.svg"
  />

  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta
    name="twitter:title"
    content="Zitheke | Buy. Sell. Connect."
  />

  <meta
    name="twitter:description"
    content="Discover trusted local listings on Zitheke. Buy, sell, and connect across Malawi."
  />

  <meta
    name="twitter:image"
    content="https://zitheke.com/favicon.svg"
  />

  <!-- Theme color -->
  <meta name="theme-color" content="#F4900C" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <!-- React Root -->
  <div id="root"></div>

  <!-- React entry -->
  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
